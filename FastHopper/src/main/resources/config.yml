# FastHopper Konfiguration
#
# hopper-interval: Wie viele Items ein normaler Hopper pro Transfer bewegt.
#
#   Normaler Hopper (kein Comparator daneben):
#     → Transferiert hopper-interval Items auf einmal (schnell!)
#
#   Sorter-Hopper (Comparator daneben):
#     → Transferiert immer nur 1 Item (Vanilla, Sorter bleibt korrekt!)
#
#   Empfohlene Werte: 8, 16 oder 32
#
hopper-interval: 16
